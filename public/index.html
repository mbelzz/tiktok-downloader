<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Downloader Santuy by satria</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">
    <div class="bg-fx" aria-hidden="true"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-3">
        <div class="container animate__animated animate__fadeInDown">
            <a class="navbar-brand fw-bold text-gradient" href="#">Santuy downloads</a>
            <span class="ms-2 badge rounded-pill badge-v2">v2</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center text-center">

        <div class="hero-section mb-5 animate__animated animate__fadeInUp">
            <h1 class="display-3 fw-bold mb-3 hero-title">
                Download Video
                <span class="hero-accent">sosial media anda</span>
            </h1>
            <p class="lead text-secondary hero-subtitle">Tempel linknya, sikat videonya. Cepet dan no ribet.</p>
            <div class="mt-3 d-flex gap-2 justify-content-center flex-wrap">
                <span class="chip">TikTok</span>
                <span class="chip chip-outline">MP4</span>
            </div>
        </div>

        <!-- Input Form -->
        <div class="card glass-card p-4 w-100 animate__animated animate__zoomIn panel" style="max-width: 640px;">
            <form id="downloadForm">
                <div class="input-group input-group-lg mb-3">
                    <span class="input-group-text icon-pill" aria-hidden="true">
                        <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M10.5 13.5l3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M7.5 16.5l-1 1a4.243 4.243 0 0 1-6-6l1-1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M16.5 7.5l1-1a4.243 4.243 0 0 1 6 6l-1 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M9 18a6 6 0 0 0 8.485-8.485" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <input type="url" class="form-control input-neon" id="urlInput" placeholder="Paste link TikTok di sini..." required>
                    <button class="btn btn-primary fw-bold px-4 btn-arcade" type="submit" id="downloadBtn">
                        <span class="btn-arcade__text">Sikat</span>
                    </button>
                </div>
            </form>

            <!-- Loading Spinner -->
            <div id="loader" class="d-none mt-3">
                <div class="d-flex align-items-center justify-content-center gap-3">
                    <div class="spinner-border text-primary" role="status" aria-label="Loading"></div>
                    <div class="text-start">
                        <div class="small text-muted">Lagi ngambil video...</div>
                        <div class="meter mt-2" aria-hidden="true"><span></span></div>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="alert alert-danger d-none mt-3" role="alert"></div>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="mt-5 w-100 d-none" style="max-width: 600px;">
            <div class="card glass-card overflow-hidden">
                <div class="row g-0">
                    <div class="col-md-5 bg-black d-flex align-items-center justify-content-center" style="min-height: 250px;">
                        <video id="videoPreview" controls class="w-100 h-100 object-fit-cover" style="max-height: 300px;"></video>
                    </div>
                    <div class="col-md-7 p-4 text-start d-flex flex-column justify-content-center">
                        <h5 class="card-title fw-bold mb-1" id="videoTitle">Judul Video</h5>
                        <p class="card-text text-muted small mb-3">By <span id="videoAuthor" class="text-primary">@username</span></p>

                        <div class="d-grid gap-2">
                            <a id="downloadLink" href="#" class="btn btn-success fw-bold" target="_blank" download>
                                Download MP4
                            </a>
                            <a id="musicLink" href="#" class="btn btn-outline-light btn-sm" target="_blank">
                                Download Musik
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <button class="btn btn-link text-muted mt-3" onclick="resetForm()">Download Lagi</button>
        </div>

    </main>

    <!-- Footer -->
    <footer class="py-4 text-center text-muted small">
        <p>&copy; 2026 Social Downloader Santuy Made by satria</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
